---
apiVersion: v1
kind: Pod
metadata:
  name: swap
  namespace: prox
  labels:
    app: swap
  annotations:
    # required in EC2 demo because host-device plugin doesn't do what SR-IOV dev plugin does
    k8s.v1.cni.cncf.io/networks: host-device-swap
spec:
  containers:
    - name: prox-container
      image: 127.0.0.1:5000/prox:latest
      imagePullPolicy: Always
      env:
        # required because of host-device doesn't set env var PCIDEVICE like SR-IOV dev plugin does
        - name: PCIDEVICE
          value: "0000:28:00.0"
      securityContext:
        privileged: true
        capabilities:
          add:
            - IPC_LOCK
            - SYS_ADMIN
      volumeMounts:
        - name: hugepages
          mountPath: /dev/hugepages
      resources:
        requests:
          cpu: 2
          memory: 1Gi
          hugepages-1Gi: 1Gi
        limits:
          cpu: 2
          memory: 1Gi
          hugepages-1Gi: 1Gi
      ports:
        - name: prox
          containerPort: 8474
        - name: control
          containerPort: 9090
  volumes:
    - name: hugepages
      emptyDir:
        medium: HugePages-1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: swap
  namespace: prox
spec:
  selector:
    app: swap
  ports:
    - name: prox
      protocol: TCP
      port: 8474
      targetPort: prox
    - name: control
      protocol: TCP
      port: 9090
      targetPort: control
