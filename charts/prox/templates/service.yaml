apiVersion: v1
kind: Service
metadata:
  name: {{ include "prox.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prox.labels" . | nindent 4 }}
spec:
  # Headless: this is the StatefulSet's governing service (spec.serviceName
  # in statefulset.yaml), giving each replica a stable, predictable DNS name
  # (<fullname>-0.<fullname>.<namespace>.svc.cluster.local, -1, ...) instead
  # of load-balancing across them. templates/rapid-env-configmap.yaml
  # addresses replicas by these names directly, so this Service is
  # structural, not optional.
  clusterIP: None
  selector:
    {{- include "prox.selectorLabels" . | nindent 4 }}
  ports:
    - name: prox
      port: 8474
      targetPort: prox
    - name: control
      port: 9090
      targetPort: control
