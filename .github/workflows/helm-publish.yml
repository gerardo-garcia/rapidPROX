#
# Packages charts/prox and publishes it as an OCI artifact to GitHub
# Container Registry, and (for tagged releases) also attaches the packaged
# .tgz to a GitHub Release.
#
# - Push to master     -> oci://ghcr.io/<owner>/charts/prox:<base>-master.<sha>
# - Push of a vX.Y.Z tag -> oci://ghcr.io/<owner>/charts/prox:X.Y.Z
#                           + GitHub Release "vX.Y.Z" with prox-X.Y.Z.tgz attached
#
# Same GHCR one-time visibility caveat as docker-publish.yml applies to the
# ghcr.io/<owner>/charts/prox package.
name: Publish Helm chart

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

jobs:
  package-and-push:
    runs-on: ubuntu-latest
    concurrency:
      group: helm-publish-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Lint chart
        run: helm lint charts/prox

      - name: Render chart (dry run, sriov defaults)
        run: helm template prox-test charts/prox

      - name: Render chart (dry run, host-device + static IPAM)
        run: |
          helm template prox-test charts/prox \
            --set network.mode=hostDevice \
            --set network.ipam.enabled=true \
            --set network.ipam.subnet=192.168.100.0/24 \
            --set network.ipam.rangeStart=192.168.100.10 \
            --set network.ipam.rangeEnd=192.168.100.20

      - name: Compute chart version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            base=$(awk '/^version:/ {print $2}' charts/prox/Chart.yaml)
            version="${base}-master.$(git rev-parse --short HEAD)"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Lowercase image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "${GITHUB_ENV}"

      - name: Package chart
        run: |
          helm package charts/prox \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}" \
            --destination .

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR
        run: helm push "prox-${{ steps.version.outputs.version }}.tgz" "oci://ghcr.io/${IMAGE_OWNER}/charts"

      - name: Upload chart as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: prox-helm-chart-${{ steps.version.outputs.version }}
          path: prox-${{ steps.version.outputs.version }}.tgz

      - name: Attach chart to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: prox-${{ steps.version.outputs.version }}.tgz
          generate_release_notes: true
